<style>
:root {
  --primary:#4a90e2; --secondary:#22c55e; --danger:#ef4444; --warning:#f59e0b;
  --bg:#f8f9fa; --bg2:#e9ecef; --card:#fff; --text:#333; --muted:#666; --border:#ddd;
  --shadow:0 4px 6px rgba(0,0,0,0.1); --grad:linear-gradient(135deg,#667eea,#764ba2);
  --opt:#f9f9f9; --optH:#e3f2fd;
}
body.dark-mode {
  --bg:#1a1a1a; --bg2:#252525; --card:#2d2d2d; --text:#e0e0e0; --muted:#b0b0b0; --border:#444; --opt:#333; --optH:#404040;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,system-ui,Arial,sans-serif;background:linear-gradient(to bottom,var(--bg),var(--bg2));color:var(--text);line-height:1.6;padding:10px}
.header{position:fixed;top:10px;left:10px;right:10px;display:flex;gap:10px;z-index:1001;flex-wrap:wrap;align-items:center}
.brand{background:#0b1220;color:#c7d2fe;border:1px solid #1f2937;padding:8px 12px;border-radius:999px;font-weight:700;text-decoration:none}
.brand:hover{box-shadow:0 0 0 2px rgba(59,130,246,.35)}
.timer{margin-left:auto;background:var(--grad);color:#fff;padding:12px 20px;border-radius:25px;font-weight:700;box-shadow:var(--shadow)}
.timer.warning{background:linear-gradient(135deg,#ef4444,#f97316);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.7}}
.theme-btn,.submit-btn{background:#6c757d;color:#fff;padding:10px 20px;border:0;border-radius:20px;font-weight:700;cursor:pointer}
.submit-btn{background:var(--secondary)}
.theme-btn:hover{background:#5a6268}

.start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--grad);text-align:center}
.start-title{font-size:2.3em;font-weight:800;color:#fff;margin-bottom:16px}
.instructions{background:var(--card);padding:24px;border-radius:16px;box-shadow:var(--shadow);max-width:640px}
.instructions h2{color:var(--primary);margin-bottom:12px}
.instruction-item{margin:10px 0}
.start-btn{background:var(--grad);color:#fff;padding:12px 28px;border:0;border-radius:40px;font-weight:800;cursor:pointer;margin-top:16px}

.container{display:flex;max-width:100%;margin:70px auto 0;gap:15px;min-height:calc(100vh - 90px)}
.question-panel{flex:3;background:var(--card);padding:24px;border-radius:15px;box-shadow:var(--shadow);overflow-y:auto}
.q-header{font-size:20px;font-weight:800;color:var(--primary);border-bottom:3px solid var(--primary);padding-bottom:10px;margin-bottom:16px;display:flex;justify-content:space-between}
.q-marks{background:var(--secondary);color:#fff;padding:4px 12px;border-radius:20px;font-size:14px}
.q-timer{color:var(--primary);padding:8px;background:var(--optH);border-radius:5px;text-align:right;margin-bottom:12px}
.q-text{margin:16px 0;line-height:1.8;font-size:18px;background:var(--opt);padding:18px;border-radius:10px;border-left:4px solid var(--primary)}

.options{list-style:none}
.option{margin:12px 0;padding:15px 18px;border-radius:10px;background:var(--opt);border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:12px}
.option:hover{background:var(--optH);border-color:var(--primary)}
.option input{transform:scale(1.2)}
.option.selected{background:var(--optH);border-color:var(--primary);font-weight:500}
.option.correct{background:#d4edda!important;border-color:#22c55e!important;color:#155724;font-weight:700}
.option.wrong{background:#f8d7da!important;border-color:#ef4444!important;color:#721c24;font-weight:700}

.palette{flex:1;background:var(--card);padding:20px;border-radius:15px;box-shadow:var(--shadow);height:fit-content;max-height:calc(100vh - 90px);overflow-y:auto}
.status-legend{background:var(--opt);padding:15px;border-radius:10px;margin-bottom:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;text-align:center}
.status-item div:first-child{font-size:24px;margin-bottom:6px;font-weight:800}
.palette-title{font-weight:800;margin-bottom:12px;color:var(--primary);text-align:center;font-size:18px}
.q-numbers{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.q-num{background:#d1d5db;padding:12px;text-align:center;cursor:pointer;border-radius:50%;font-weight:800;transition:.2s;min-height:45px;display:flex;align-items:center;justify-content:center}
.q-num.answered{background:#22c55e;color:#052e12}
.q-num.viewed{background:#3b82f6;color:#fff}
.q-num.reviewed{background:#f59e0b;color:#111827}
.q-num.current{border:3px solid var(--primary);box-shadow:0 0 0 3px rgba(74,144,226,.3);transform:scale(1.06)}

/* Dark mode visibility */
body.dark-mode .q-num { color:#111827; background:#d1d5db; border:1px solid #374151; }
body.dark-mode .q-num.current { color:#1e3a8a; background:#e5e7eb; }
body.dark-mode .q-num.answered { color:#052e12; background:#22c55e; }
body.dark-mode .q-num.viewed { color:#ffffff; background:#3b82f6; }
body.dark-mode .q-num.reviewed { color:#111827; background:#f59e0b; }

#nav{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:10px;width:calc(100% - 20px);max-width:900px;background:var(--card);padding:12px;border-radius:15px;box-shadow:var(--shadow)}
#nav button{padding:12px 20px;border:2px solid var(--primary);background:var(--card);color:var(--primary);cursor:pointer;border-radius:25px;font-weight:800;flex:1}
#nav button:disabled{background:#e5e7eb;color:#6b7280;cursor:not-allowed;border-color:#e5e7eb}

.result{text-align:center;padding:32px;background:linear-gradient(135deg,#f5f7fa,#c3cfe2);border-radius:15px;display:none}
body.dark-mode .result{background:linear-gradient(135deg,#2d2d2d,#3d3d3d)}
.result-title{font-size:28px;font-weight:800;color:var(--primary);margin-bottom:20px}
.metrics{display:flex;justify-content:center;gap:18px;flex-wrap:wrap}
.metric{background:var(--card);padding:20px;border-radius:12px;box-shadow:var(--shadow);min-width:140px}
.metric .metric-value{font-size:24px;font-weight:800;color:var(--primary)}

@media(max-width:768px){
  .container{flex-direction:column;margin-top:100px}
  .question-panel,.palette{width:100%;margin-bottom:100px}
  #nav{flex-direction:column}
  .header{flex-direction:column;align-items:flex-end}
}
</style>
</head>
<body>
  <div class="header" id="header" style="display:none;">
    <a class="brand" href="https://t.me/Boss_Quiz_Robot" target="_blank" rel="noopener">Boss_Quiz_Robot</a>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
    <button class="submit-btn" onclick="submit()" id="submitBtn">Submit</button>
    <div class="timer" id="timer">Time: 60:00</div>
  </div>

  <div class="start-screen" id="start">
    <h1 class="start-title">General Aptitude Unit 33 - Hindi</h1>
    <div class="instructions">
      <h2>Test Instructions</h2>
      <div class="instruction-item">Total Questions: 20</div>
      <div class="instruction-item">Time Limit: 60 minutes</div>
      <div class="instruction-item">Use keyboard: Arrows, 1-5, M</div>

  <div class="container" id="main" style="display:none;">

        <div class="q-text" id="qText"></div>
        <div id="solutionSlot"></div>
        <ul class="options" id="options"></ul>
      </div>
      <div class="result" id="result">
        <div class="result-title">Performance Summary</div>
        <div class="metrics" id="metrics"></div>
        <button class="start-btn" onclick="review()">Review Answers</button>
      </div>
    </div>

    <div class="palette">
      <div class="status-legend">
        <div class="metric"><div class="metric-value" id="ans">0</div><div>Answered</div></div>
        <div class="metric"><div class="metric-value" id="notAns">20</div><div>Not Answered</div></div>
        <div class="metric"><div class="metric-value" id="notVis">20</div><div>Not Visited</div></div>
        <div class="metric"><div class="metric-value" id="rev">0</div><div>Review</div></div>
      </div>
      <div class="palette-title">Questions</div>
      <div class="q-numbers" id="palette"></div>
    </div>
  </div>

  <div id="nav" style="display:none;">
    <button id="prevBtn" onclick="prev()">← Previous</button>
    <button id="markBtn" onclick="mark()">⭐ Mark</button>
    <button id="nextBtn" onclick="next()">Next →</button>
  </div>

 src=\"https://appxcontent.kaxa.in/paperimages/1725797030_1725797030127023_thump.png\" style=\"height:189px; width:365px\" /></p>"}, {"qid": "", "question": "<p><img src=\"https://appxcontent.kaxa.in/paperimages/1725798100_1725798100982655_thump.png\" style=\"height:387px; width:637px\" /></p>", "options": ["<p>a</p>", "<p>b</p>", "<p>c</p>", "<p>d</p>"], "correct": 4, "marks": "1", "explanation": "<p><img src=\"https://appxcontent.kaxa.in/paperimages/1725798119_1725798119243463_thump.png\" style=\"height:139px; width:223px\" /></p>"}, {"qid": "", "question": "<p><img src=\"https://appxcontent.kaxa.in/paperimages/1725798142_1725798142252262_thump.png\" style=\"height:412px; width:697px\" /></p>", "options": ["<p>a</p>", "<p>b</p>", "<p>c</p>", "<p>d</p>"], "correct": 3, "marks": "1", "explanation": "<p>correct option is c</p>"}, {"qid": "", "question": "<p><img src=\"https://appxcontent.kaxa.in/paperimages/1725858798_1725858798268530_thump.png\" style=\"height:455px; width:614px\" /></p>", "options": ["<p>a</p>", "<p>b</p>", "<p>c</p>", "<p>d</p>"], "correct": 3, "marks": "1", "explanation": "<p><img src=\"https://appxcontent.kaxa.in/paperimages/1725858817_1725858817192530_thump.png\" style=\"height:214px; width:754px\" /></p>"}, {"qid": "", "question": "<p><img src=\"https://appxcontent.kaxa.in/paperimages/1725858851_1725858851835113_thump.png\" style=\"height:434px; width:653px\" /></p>", "options": ["<p>a</p>", "<p>b</p>", "<p>c</p>", "<p>d</p>"], "correct": 4, "marks": "1", "explanation": "<p><img src=\"https://appxcontent.kaxa.in/paperimages/1725858866_1725858866764389_thump.png\" style=\"height:332px; width:458px\" /></p>"}, {"qid": "", "question": "<p><img src=\"https://appxcontent.kaxa.in/paperimages/1725858906_1725858906208906_thump.png\" style=\"height:481px; width:601px\" /></p>", "options": ["<p>a</p>", "<p>b</p>", "<p>c</p>", "<p>d</p>"], "correct": 3, "marks": "1", "explanation": "<p><img src=\"https://appxcontent.kaxa.in/paperimages/1725858932_1725858 ntent.kaxa.in/paperimages/1725859180_1725859180697198_thump.png\" style=\"height:108px; width:398px\" /></p>"}];
const TIME = 3600;

let time = TIME, curr = 0, ans = {}, rev = [], vis = [], qTimes = [], qStart = null;
let done = false, reviewMode = false, timerHandle = null;

function toggleTheme(){
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  document.getElementById('themeBtn').textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
window.addEventListener('DOMContentLoaded', () => {
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark') {
    document.body.classList.add('dark-mode');
    const btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = '☀️ Light Mode';
  }
});

function startTest(){
  document.getElementById('start').style.display='none';
  document.getElementById('header').style.display='flex';
  document.getElementById('main').style.display='flex';
  document.getElementById('qContainer').style.display='block';
  document.getElementById('result').style.display='none';
  document.getElementById('nav').style.display='flex';
  if (document.getElementById('palette').children.length === 0) {
    initPalette();
  }
  show(0);
  if (!timerHandle) startTimer();
}

function initPalette(){
  const p = document.getElementById('palette');
  p.innerHTML = '';
  Q.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'q-num'; d.textContent = i + 1; d.onclick = () => show(i);
    p.appendChild(d); rev[i] = false; vis[i] = false; qTimes[i] = 0;
  });
  updateStats();
}

function renderOptionHTML(text){ return text; }

function show(i){
  if (qStart !== null && !reviewMode) qTimes[curr] += Math.floor((Date.now() - qStart) / 1000);
  if (done && !reviewMode) return;
  vis[i] = true; curr = i; const q = Q[i];
  document.getElementById('qNum').textContent = `Question ${i+1} of ${Q.length}`;
  document.getElementById('marks').textContent = q.marks;
  document.getElementById('qText').innerHTML = q.question;

  const opts = document.getElementById('options'); opts.innerHTML = '';
  document.getElementById('solutionSlot').innerHTML = ''; // single solution panel

  if (reviewMode) {
    const t = qTimes[i];
    document.getElementById('qTimer').textContent = `Time: ${pad(Math.floor(t/60))}:${pad(t%60)}`;
    q.options.forEach((o, j) => {
      const li = document.createElement('li'); li.className = 'option';
      const letter = String.fromCharCode(65 + j);
      li.innerHTML = `${letter}. ` + renderOptionHTML(o);
      const isCorrect = (j + 1) === q.correct;
      const isUser = ans[i] === (j + 1);
      if (isUser && isCorrect) li.classList.add('correct');
      else if (isUser) li.classList.add('wrong');
      else if (isCorrect) li.classList.add('correct');
      opts.appendChild(li);
    });

    const slot = document.getElementById('solutionSlot');
    const sol = document.createElement('div');
    sol.className = 'solution-wrap';
    sol.style.marginTop = '14px';
    const body = (Q[i].explanation || '');
    sol.innerHTML = `
      <details style="background:var(--opt);border:1px solid var(--border);border-radius:10px;padding:12px;">
        <summary style="cursor:pointer;font-weight:800;color:var(--primary)">View Solution</summary>
        <div style="margin-top:10px" class="solution-body">${body}</div>
      </details>
    `;
    slot.appendChild(sol);
    sol.querySelectorAll && sol.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; });
    const det = sol.querySelector('details');
    if (ans[i] && ans[i] !== q.correct) det.setAttribute('open','open');

    document.getElementById('nav').style.display = 'flex';
    document.getElementById('markBtn').disabled = true;
    document.getElementById('prevBtn').disabled = (curr === 0);
    document.getElementById('nextBtn').disabled = (curr === Q.length - 1);
  } else {
    document.getElementById('qTimer').textContent = 'Time: 00:00';
    q.options.forEach((o, j) => {
      const li = document.createElement('li'); li.className = 'option';
      const letter = String.fromCharCode(65 + j);
      const inp = document.createElement('input');
      inp.type = 'radio'; inp.name = 'answer'; inp.value = j + 1; inp.id = `o${i}-${j}`;
      if (ans[i] === (j + 1)) { inp.checked = true; li.classList.add('selected'); }
      inp.onchange = () => {
        ans[i] = parseInt(inp.value); updatePalette(); updateStats();
        document.querySelectorAll('#options .option').forEach(x => x.classList.remove('selected'));
        li.classList.add('selected');
      };
      const lbl = document.createElement('label'); lbl.htmlFor = inp.id; lbl.innerHTML = `${letter}. ` + renderOptionHTML(o);
      li.appendChild(inp); li.appendChild(lbl);
      li.onclick = e => { if (e.target.tagName !== 'INPUT') { inp.checked = true; inp.onchange(); } };
      opts.appendChild(li);
    });
    document.getElementById('markBtn').disabled = false;
    document.getElementById('nav').style.display = 'flex';
    qStart = Date.now();
  }
  updatePalette(); updateStats(); updateNav();
  if (window.MathJax) MathJax.typeset([document.getElementById('qText'), document.getElementById('options'), document.getElementById('solutionSlot')]);
}

function updatePalette(){
  document.querySelectorAll('.q-num').forEach((n, i) => {
    n.classList.remove('viewed','answered','reviewed','current');
    if (i === curr) n.classList.add('current');
    if (rev[i]) n.classList.add('reviewed');
    else if (ans[i]) n.classList.add('answered');
    else if (vis[i]) n.classList.add('viewed');
  });
}
function updateStats(){
  const a = Object.keys(ans).length;
  document.getElementById('ans').textContent = a;
  document.getElementById('notAns').textContent = Q.length - a;
  document.getElementById('notVis').textContent = vis.filter(v => !v).length;
  document.getElementById('rev').textContent = rev.filter(Boolean).length;
}
function updateNav(){
  const atEnd = curr === Q.length - 1;
  document.getElementById('prevBtn').disabled = curr === 0 && !reviewMode;
  document.getElementById('nextBtn').disabled = atEnd;
}
function mark(){ if (!done) { rev[curr] = !rev[curr]; updatePalette(); updateStats(); updateNav(); } }
function prev(){ if (curr > 0) show(curr - 1); }
function next(){ if (curr < Q.length - 1) show(curr + 1); }

function startTimer(){
  if (timerHandle) return;
  timerHandle = setInterval(() => {
    if (!reviewMode && qStart) {
      const e = Math.floor((Date.now() - qStart) / 1000);
      document.getElementById('qTimer').textContent = `Time: ${pad(Math.floor(e/60))}:${pad(e%60)}`;
    }
    const m = Math.floor(time / 60); const s = time % 60;
    document.getElementById('timer').textContent = `Time: ${pad(m)}:${pad(s)}`;
    if (time <= 300) document.getElementById('timer').classList.add('warning');
    if (time > 0) time--; else { stopAll(); alert('Time up!'); submit(true); }
  }, 1000);
}
function stopAll(){ if (timerHandle) { clearInterval(timerHandle); timerHandle = null; } qStart = null; }

function submit(auto=false){
  if (done) return;
  if (!auto) {
    const un = Q.length - Object.keys(ans).length;
    if (un > 0 && time > 0 && !confirm(`${un} unanswered. Submit?`)) return;
  }
  if (qStart && !reviewMode) qTimes[curr] += Math.floor((Date.now() - qStart) / 1000);
  done = true; stopAll();

  document.getElementById('submitBtn').disabled = true;
  document.querySelectorAll('input[type=radio]').forEach(r => r.disabled = true);

  let cor = 0, wrg = 0, una = 0;
  Q.forEach((q, i) => { if (!ans[i]) una++; else if (ans[i] === q.correct) cor++; else wrg++; });
  const score = cor - (wrg * 0.25);
  const acc = (cor + wrg) ? (cor / (cor + wrg) * 100).toFixed(1) : "0.0";
  const spent = TIME - time; const tm = `${pad(Math.floor(spent/60))}:${pad(spent%60)}`;
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-value">${score.toFixed(1)}/${Q.length}</div><div>Score</div></div>
    <div class="metric"><div class="metric-value">${cor}</div><div>Correct</div></div>
    <div class="metric"><div class="metric-value">${wrg}</div><div>Wrong</div></div>
    <div class="metric"><div class="metric-value">${una}</div><div>Skipped</div></div>
    <div class="metric"><div class="metric-value">${acc}%</div><div>Accuracy</div></div>
    <div class="metric"><div class="metric-value">${tm}</div><div>Time</div></div>
  `;
  document.getElementById('qContainer').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('nav').style.display = 'none';
}

function review(){
  reviewMode = true;
  document.getElementById('result').style.display = 'none';
  document.getElementById('qContainer').style.display = 'block';
  document.getElementById('nav').style.display = 'flex';
  show(curr = 0);
}

function pad(n){ return String(n).padStart(2,'0'); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') prev();
  else if (e.key === 'ArrowRight') next();
});
</script>
</body>
</html>
